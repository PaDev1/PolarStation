<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c1a2e"/>
      <stop offset="100%" stop-color="#06101e"/>
    </linearGradient>
    <radialGradient id="glow" cx="256" cy="256" r="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4a9ad4" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#4a9ad4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="starGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="20%" stop-color="#ddeeff"/>
      <stop offset="50%" stop-color="#5aace0" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#4a9ad4" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="clip">
      <rect width="512" height="512" rx="112"/>
    </clipPath>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#glow)"/>

  <g clip-path="url(#clip)">
    <!-- 4 concentric circles, bolder, higher contrast -->
    <circle cx="256" cy="256" r="58"  fill="none" stroke="#5cb8e8" stroke-width="2.5" opacity="0.55"/>
    <circle cx="256" cy="256" r="108" fill="none" stroke="#4aa0d4" stroke-width="2.2" opacity="0.42"/>
    <circle cx="256" cy="256" r="165" fill="none" stroke="#3a88be" stroke-width="1.8" opacity="0.30"/>
    <circle cx="256" cy="256" r="230" fill="none" stroke="#2a70a6" stroke-width="1.5" opacity="0.20"/>
  </g>

  <!-- Polaris -->
  <circle cx="256" cy="256" r="40" fill="url(#starGlow)" opacity="0.6"/>
  <g stroke="#d0eaff" stroke-linecap="round">
    <line x1="256" y1="208" x2="256" y2="304" stroke-width="2" opacity="0.45"/>
    <line x1="208" y1="256" x2="304" y2="256" stroke-width="2" opacity="0.45"/>
  </g>
  <circle cx="256" cy="256" r="10" fill="#ffffff"/>
  <circle cx="256" cy="256" r="5.5" fill="#ffffff"/>
</svg>
