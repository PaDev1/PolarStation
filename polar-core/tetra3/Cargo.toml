[package]
edition = "2021"
name = "tetra3"
version = "0.3.2"
build = false
exclude = [
    "data/",
    "download_hip2.sh",
]
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "Rust implementation of Tetra3: Fast and robust star plate solver"
homepage = "https://tetra3rs.dev"
readme = "README.md"
keywords = [
    "star-plate-solver",
    "astrometry",
    "astronomy",
    "image-processing",
    "pattern-recognition",
]
categories = [
    "aerospace",
    "algorithms",
    "mathematics",
    "science",
]
license = "MIT AND Apache-2.0"
repository = "https://github.com/ssmichael1/tetra3rs"

[features]
default = []
gaia = ["dep:csv"]
image = ["dep:image"]

[lib]
name = "tetra3"
path = "src/lib.rs"

[[test]]
name = "integration_test"
path = "tests/integration_test.rs"

[[test]]
name = "skyview_solve_test"
path = "tests/skyview_solve_test.rs"
required-features = ["image"]

[[test]]
name = "tess_solve_test"
path = "tests/tess_solve_test.rs"
required-features = ["image"]

[[test]]
name = "test_data"
path = "tests/test_data.rs"

[dependencies.anyhow]
version = "1.0.71"

[dependencies.csv]
version = "1.4.0"
optional = true

[dependencies.image]
version = "0.25"
features = [
    "jpeg",
    "png",
    "tiff",
]
optional = true
default-features = false

[dependencies.nalgebra]
version = "0.34.1"
features = ["std"]

[dependencies.num-traits]
version = "0.2.15"

[dependencies.rkyv]
version = "0.8"
features = ["bytecheck", "pointer_width_64"]

[dependencies.tracing]
version = "0.1.40"
features = ["std"]

[dependencies.tracing-subscriber]
version = "0.3.20"
features = [
    "fmt",
    "env-filter",
]

[dev-dependencies.rand]
version = "0.10.0"

[dev-dependencies.rand_distr]
version = "0.6.0"

[dev-dependencies.ureq]
version = "3"

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1

[profile.test]
opt-level = 3
